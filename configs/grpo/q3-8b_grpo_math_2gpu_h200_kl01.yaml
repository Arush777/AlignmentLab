# Full-scale H200 GRPO @ KL=0.1 on ≤2 GPUs (shared-host constraint).
# Science recipe matched to prior kl01 arms: rlvr_math ~45k, bs=128, n=8,
# ~355 steps, KL=0.1 / k3 — only GPU split differs from the retired 5-GPU layout.
#
# Split: non-colocated 1 train + 1 vLLM (avoids colocate sleep deadlock).
# Mid-run HF checkpoints enabled (10TB under /data/anupam).
#
# Launch:
#   CUDA_VISIBLE_DEVICES=<A>,<B> bash scripts/local/ray_launch.sh \
#     --config configs/grpo/q3-8b_grpo_math_2gpu_h200_kl01.yaml \
#     --reward-mode gt \
#     --sft-ckpt hub:Arushhh/alab-q3-8b_sft_tulu_0705 \
#     --run-id q3-8b_grpo-gt_math2h200_kl01

model: Qwen/Qwen3-8B
model_short: q3-8b
sft_ckpt: null
reward_mode: gt
seed: 42
sample_log_rate: 0.01

data:
  prompt_dataset: data/processed/rlvr_math.jsonl
  data_tag: math
  input_key: prompt
  label_key: answer
  apply_chat_template: true
  max_samples: 100000

grpo:
  advantage_estimator: group_norm
  n_samples_per_prompt: 8
  kl_init_coef: 0.1
  kl_use_loss: true
  kl_estimator: k3

rollout:
  prompt_max_len: 4096
  response_max_len: 8192
  batch_size: 128
  micro_batch_size: 8
  temperature: 1.0
  top_p: 1.0

train:
  batch_size: 128
  micro_batch_size: 1
  num_episodes: 1
  max_epochs: 1
  actor_lr: 1.0e-6
  zero_stage: 3
  colocate_all: false
  train_gpus: 1
  packing_samples: true
  gradient_checkpointing: true
  max_tokens_per_gpu: 8192
  ref_offload: false
  adam_offload: false

vllm:
  num_engines: 1
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.75
  enforce_eager: false

ckpt:
  save_steps: 50
  max_num: 3
  save_hf: true
