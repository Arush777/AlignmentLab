# 4-GPU NON-COLOCATED gt with KL=0.1 — same block size as completed format/random.
# Split: train_gpus=3 + vllm.num_engines=1. Deadlock fix = no colocate sleep cycle
# (gt hung on sleep, not OOM — placebos finished full runs on 4x80G). KL=0.1 leash.
# 8B + ZeRO-3 + adam/ref offload + grad ckpt fits 4x80G easily; do NOT escalate to
# 5–6 GPU for "memory". If activation OOM ever hit: cut micro_batch / max_tokens_per_gpu
# / response_max_len — not GPU count.
# Launch: --gpus 4 --cpus 16 --run-id <..._4gpu_..._kl01>

model: Qwen/Qwen3-8B
model_short: q3-8b
sft_ckpt: null
reward_mode: gt
seed: 42
sample_log_rate: 0.01

data:
  prompt_dataset: data/processed/rlvr_math.jsonl
  data_tag: math
  input_key: prompt
  label_key: answer
  apply_chat_template: true
  max_samples: 100000

grpo:
  advantage_estimator: group_norm
  n_samples_per_prompt: 8
  kl_init_coef: 0.1        # STRONGER leash (was 0.04) — same as 5/6gpu kl01
  kl_use_loss: true
  kl_estimator: k3

rollout:
  prompt_max_len: 4096
  response_max_len: 8192
  batch_size: 128
  micro_batch_size: 8
  temperature: 1.0
  top_p: 1.0

train:
  batch_size: 128
  micro_batch_size: 2
  num_episodes: 1
  max_epochs: 1
  actor_lr: 1.0e-6
  zero_stage: 3
  colocate_all: false       # NON-COLOCATED: kills the step-57 sleep deadlock
  train_gpus: 3             # actor+ref sub-pool; rest -> vLLM
  packing_samples: true
  gradient_checkpointing: true
  max_tokens_per_gpu: 16384
  ref_offload: true
  adam_offload: true

vllm:
  num_engines: 1            # 1 dedicated generation GPU (3+1=4)
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.85
  enforce_eager: false

ckpt:
  save_steps: -1
  max_num: 1
  save_hf: true
