# Full-scale H200 GRPO gt@KL=0.1 — same science recipe as CCC 5gpu_kl01
# (45k rlvr prompts, bs=128, n=8, ~355 steps, KL=0.1, k3).
# H200 141GB: adam stays on GPU (no DeepSpeedCPUAdam / ds_opt_adam breakage).
# Split: 4 train + 1 vLLM. Launch with CUDA_VISIBLE_DEVICES spanning 5 GPUs.

model: Qwen/Qwen3-8B
model_short: q3-8b
sft_ckpt: null
reward_mode: gt
seed: 42
sample_log_rate: 0.01

data:
  prompt_dataset: data/processed/rlvr_math.jsonl
  data_tag: math
  input_key: prompt
  label_key: answer
  apply_chat_template: true
  max_samples: 100000

grpo:
  advantage_estimator: group_norm
  n_samples_per_prompt: 8
  kl_init_coef: 0.1
  kl_use_loss: true
  kl_estimator: k3

rollout:
  prompt_max_len: 4096
  response_max_len: 8192
  batch_size: 128
  micro_batch_size: 8
  temperature: 1.0
  top_p: 1.0

train:
  batch_size: 128
  micro_batch_size: 2
  num_episodes: 1
  max_epochs: 1
  actor_lr: 1.0e-6
  zero_stage: 3
  colocate_all: false
  train_gpus: 4
  packing_samples: true
  gradient_checkpointing: true
  max_tokens_per_gpu: 16384
  ref_offload: false
  adam_offload: false

vllm:
  num_engines: 1
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.85
  enforce_eager: false

ckpt:
  save_steps: -1
  max_num: 1
  save_hf: true
