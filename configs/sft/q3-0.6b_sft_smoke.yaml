run_id: q3-0.6b_sft_smoke_0705
model_name_or_path: Qwen/Qwen3-0.6B
dataset_path: data/processed/sft.jsonl
seed: 42
conda_env: alab-sft

resources:
  n_gpus: 1
  n_cpus: 8
  mem: 64G
  wall_time: "00:30"

training:
  max_train_samples: 256
  max_steps: 20
  max_seq_length: 2048
  packing: true
  assistant_only_loss: false  # Qwen3/Llama chat templates lack {% generation %} masks; full-sequence loss keeps arms symmetric
  bf16: true
  learning_rate: 2.0e-5
  lr_scheduler_type: cosine
  warmup_ratio: 0.03
  weight_decay: 0.0
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  gradient_checkpointing: true
  logging_steps: 1
  save_steps: 20
  save_total_limit: 1
  deepspeed: false
  dataloader_num_workers: 2
