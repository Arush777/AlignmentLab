# alab-eval — lm-evaluation-harness (vLLM backend) + pass@k scoring (Track B / Codex)
#
# vllm is pinned to 0.22.1 to match alab-rl so a checkpoint that trained under one
# vLLM generates identically under the other (reproducible pass@k). math-verify is the
# same grader used by the GRPO `gt` reward, so eval accuracy and reward agree by
# construction. Latest mutually-compatible set known as of 2026-01 (my cutoff).
name: alab-eval
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - git
  - pip:
      - lm-eval[vllm]==0.4.9.1
      - vllm==0.22.1
      - math-verify==0.7.0
      - latex2sympy2_extended==1.0.6
      - datasets==4.4.0
      - wandb
