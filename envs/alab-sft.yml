# alab-sft — TRL SFT/DPO training environment (Track B / Codex consumes this)
#
# A separate env from alab-rl on purpose: TRL tracks the current transformers line,
# while OpenRLHF pins transformers==5.7.0. Keeping them apart avoids a resolver war.
# Versions are the latest mutually-compatible set known as of 2026-01 (my cutoff);
# bump together if a newer coherent TRL/transformers/accelerate release lands.
#
# flash-attn is installed in a second step (needs torch present first):
#   conda run -n alab-sft pip install --no-build-isolation flash-attn==2.8.3
name: alab-sft
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - git
  - pip:
      - torch==2.7.1
      - transformers==4.57.1
      - trl==0.24.0
      - accelerate==1.11.0
      - deepspeed==0.19.1
      - peft==0.18.0
      - datasets==4.4.0
      - bitsandbytes==0.48.1
      - sentencepiece
      - wandb
      # flash-attn==2.8.3 -> install post-create with --no-build-isolation (see header)
